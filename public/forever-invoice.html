<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sales Invoice</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #f4f4f4; }
  body { font-family: "Segoe UI", Tahoma, sans-serif; color: #111; }
  .receipt {
    width: 80mm; max-width: 320px; margin: 0 auto; background: #fff;
    padding: 10px 12px 16px; font-size: 12px; line-height: 1.4;
  }
  .center { text-align: center; }
  .co-name { font-size: 17px; font-weight: 800; letter-spacing: .5px; color: #1f7a44; }
  .co-sub { font-size: 10.5px; color: #333; margin-top: 1px; }
  .rule { border-top: 1px dashed #999; margin: 8px 0; }
  .doc-title { text-align: center; font-weight: 700; font-size: 12.5px; letter-spacing: 1px; margin: 2px 0; }
  .meta { font-size: 11px; }
  .meta div { display: flex; justify-content: space-between; gap: 8px; }
  .meta b { font-weight: 600; }
  table { width: 100%; border-collapse: collapse; margin-top: 4px; }
  th { font-size: 10px; text-transform: uppercase; letter-spacing: .3px; color: #555; text-align: left; border-bottom: 1px solid #333; padding: 2px 0; }
  td { padding: 3px 0; vertical-align: top; font-size: 11.5px; }
  .num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .itemname { word-break: break-word; }
  .totals { margin-top: 6px; border-top: 1px solid #333; padding-top: 6px; }
  .totals div { display: flex; justify-content: space-between; }
  .grand { font-size: 14px; font-weight: 800; }
  .words { font-size: 10.5px; font-style: italic; color: #444; margin-top: 4px; }
  .foot { text-align: center; font-size: 10px; color: #444; margin-top: 10px; }
  .toolbar { text-align: center; margin: 14px auto; }
  .toolbar label { font-size: 12px; margin-right: 12px; cursor: pointer; }
  .btn { background: #1f7a44; color: #fff; border: 0; padding: 9px 18px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  @media print {
    body { background: #fff; }
    .receipt { width: 80mm; max-width: none; padding: 0 2mm; }
    .noprint { display: none !important; }
    @page { margin: 4mm; }
  }
</style>
</head>
<body>
  <div class="receipt" id="receipt">
    <div class="center">
      <div class="co-name" id="co-name">…</div>
      <div class="co-sub" id="co-addr"></div>
      <div class="co-sub" id="co-phone"></div>
    </div>
    <div class="rule"></div>
    <div class="doc-title" id="doc-title">SALES INVOICE</div>
    <div class="meta">
      <div><b>Invoice:</b> <span id="inv-no"></span></div>
      <div><b>Date:</b> <span id="date"></span></div>
      <div><b>Served by:</b> <span id="sold-by"></span></div>
      <div id="cust-row"><b>Customer:</b> <span id="cust-name"></span></div>
    </div>
    <div class="rule"></div>
    <table>
      <thead>
        <tr><th style="width:26px">Qty</th><th>Item</th><th class="num" id="th-price">Price</th><th class="num">Amount</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="totals">
      <div class="grand"><span>TOTAL</span><span id="grand-total"></span></div>
      <div id="paid-row" style="display:none;font-size:11px"><span>Paid</span><span id="paid-amt"></span></div>
      <div id="bal-row" style="display:none;font-size:11px;font-weight:700"><span>Balance</span><span id="bal-amt"></span></div>
    </div>
    <div class="words" id="amount-words"></div>
    <div class="rule"></div>
    <div class="foot">
      Goods sold in good condition are not returnable.<br>
      No refund of money after payment.<br>
      <b>Thank you for your patronage!</b>
    </div>
  </div>

  <div class="toolbar noprint">
    <label><input type="checkbox" id="togglePrice" checked /> Show unit price</label>
    <button class="btn" onclick="window.print()">🖨️ Print</button>
  </div>

<script>
  let sale = { invoice_number:"", created_at:new Date().toISOString(), customer_name:"", items:[], sold_by:"" };
  let showPrice = true;
  const naira = (n) => "\u20a6" + Number(n||0).toLocaleString("en-NG", { minimumFractionDigits: 2 });
  function esc(t){ return String(t==null?"":t).replace(/[&<>"\x27]/g, function(ch){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","\x27":"&#39;"}[ch]; }); }

  function nairaInWords(amount){
    const a = Math.floor(amount);
    if (a === 0) return "Zero naira only";
    const ones=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
    const tens=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
    function below1000(n){ let s=""; if(n>=100){ s+=ones[Math.floor(n/100)]+" Hundred"; n%=100; if(n) s+=" and "; } if(n>=20){ s+=tens[Math.floor(n/10)]; n%=10; if(n) s+="-"+ones[n]; } else if(n>0){ s+=ones[n]; } return s; }
    const units=[["Billion",1e9],["Million",1e6],["Thousand",1e3]];
    let n=a, parts=[];
    for(const [name,val] of units){ if(n>=val){ parts.push(below1000(Math.floor(n/val))+" "+name); n%=val; } }
    if(n>0) parts.push(below1000(n));
    let str = parts.join(", ").trim()+" naira only";
    return str.charAt(0).toUpperCase()+str.slice(1);
  }

  function render(){
    document.getElementById("co-name").textContent = sale.company_name || "SALES INVOICE";
    document.getElementById("co-addr").textContent = sale.company_address || "";
    document.getElementById("co-phone").textContent = sale.company_phone ? ("Tel: " + sale.company_phone) : "";
    const type = (sale.sale_type || "").toUpperCase();
    document.getElementById("doc-title").textContent = (type ? type + " " : "") + "SALES INVOICE";
    document.getElementById("inv-no").textContent = sale.invoice_number || "";
    document.getElementById("date").textContent = new Date(sale.created_at).toLocaleString("en-NG", { day:"2-digit", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" });
    document.getElementById("sold-by").textContent = sale.sold_by || "";
    if (sale.customer_name) { document.getElementById("cust-name").textContent = sale.customer_name; }
    else { document.getElementById("cust-row").style.display = "none"; }
    document.getElementById("th-price").textContent = showPrice ? "Price" : "Price";

    const tbody = document.getElementById("rows"); tbody.innerHTML = "";
    let total = 0;
    (sale.items || []).forEach(function(item){
      const amount = item.quantity * item.unit_price; total += amount;
      const tr = document.createElement("tr");
      tr.innerHTML =
        '<td class="num">'+item.quantity+'</td>'+
        '<td class="itemname">'+esc(item.name)+'</td>'+
        '<td class="num">'+(showPrice ? naira(item.unit_price) : "-")+'</td>'+
        '<td class="num">'+naira(amount)+'</td>';
      tbody.appendChild(tr);
    });
    document.getElementById("grand-total").textContent = naira(total);
    document.getElementById("amount-words").textContent = nairaInWords(total);

    // Credit / reseller: show paid + balance.
    if (sale.sale_type === "credit" || sale.sale_type === "reseller") {
      const paid = Number(sale.amount_paid) || 0;
      const bal = total - paid;
      document.getElementById("paid-row").style.display = "flex";
      document.getElementById("bal-row").style.display = "flex";
      document.getElementById("paid-amt").textContent = naira(paid);
      document.getElementById("bal-amt").textContent = naira(bal);
    }
  }

  document.getElementById("togglePrice").addEventListener("change", function(e){
    showPrice = e.target.checked; render();
  });

  const params = new URLSearchParams(location.search);
  const saleId = params.get("id");
  const apiBase = localStorage.getItem("apiBase");
  const token = localStorage.getItem("token");
  const companyId = localStorage.getItem("companyId");

  (async function(){
    if(!saleId || !apiBase){ document.getElementById("receipt").innerHTML = '<p style="padding:16px;font-size:13px">Open this from the Sales or Records screen.</p>'; return; }
    try{
      const res = await fetch(apiBase + "/sales/" + saleId, { headers: { "Authorization": "Bearer " + token, "X-Company-Id": companyId } });
      if(!res.ok) throw new Error("Could not load this sale.");
      sale = await res.json();
      render();
      setTimeout(function(){ window.print(); }, 400);
    }catch(e){ document.getElementById("receipt").innerHTML = '<p style="padding:16px;font-size:13px">' + e.message + '</p>'; }
  })();
</script>
</body>
</html>
