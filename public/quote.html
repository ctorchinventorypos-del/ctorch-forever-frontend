<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quotation</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: Arial, Helvetica, sans-serif; color: #143; margin: 0; padding: 28px; }
  .wrap { max-width: 800px; margin: 0 auto; }
  .top { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid #1f7a44; padding-bottom: 12px; }
  .co { font-size: 22px; font-weight: 800; color: #1f7a44; }
  .co small { display: block; font-size: 12px; font-weight: 400; color: #555; margin-top: 2px; }
  .title { text-align: right; }
  .title h1 { font-size: 18px; margin: 0; color: #1f7a44; letter-spacing: .5px; }
  .meta { display: flex; justify-content: space-between; margin: 14px 0 18px; font-size: 13.5px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 9px 10px; border-bottom: 1px solid #dce8df; text-align: left; }
  th { background: #eaf5ee; color: #1f6b3e; font-size: 12px; text-transform: uppercase; letter-spacing: .4px; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  tfoot td { font-weight: 800; border-top: 2px solid #1f7a44; font-size: 15px; }
  .note { margin-top: 18px; font-size: 12.5px; color: #555; }
  .foot { margin-top: 30px; font-size: 12px; color: #667; }
  .sign { margin-top: 40px; display: flex; justify-content: space-between; font-size: 12.5px; }
  .sign span { border-top: 1px solid #999; padding-top: 5px; width: 45%; text-align: center; }
  @media print { body { padding: 0; } .noprint { display: none; } }
  .noprint { text-align: center; margin-top: 20px; }
  .btn { background: #1f7a44; color: #fff; border: 0; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="co" id="company">…<small id="company-sub"></small></div>
      <div class="title"><h1>QUOTATION</h1><div style="font-size:11px;color:#667">(Proforma Invoice)</div></div>
    </div>

    <div class="meta">
      <div>
        <div style="color:#667;font-size:12px">QUOTE FOR</div>
        <div style="font-weight:700" id="cust">—</div>
        <div id="cust-phone" style="color:#667"></div>
      </div>
      <div style="text-align:right">
        <div><b>No:</b> <span id="qno"></span></div>
        <div><b>Date:</b> <span id="date"></span></div>
      </div>
    </div>

    <table>
      <thead>
        <tr><th style="width:46px">#</th><th class="num" style="width:64px">Qty</th><th>Description</th><th class="num">Unit Price</th><th class="num">Amount</th></tr>
      </thead>
      <tbody id="rows"></tbody>
      <tfoot>
        <tr><td colspan="4" class="num">TOTAL</td><td class="num" id="total"></td></tr>
      </tfoot>
    </table>

    <div class="note" id="note"></div>
    <div class="foot">This is a price quotation, not a receipt. Prices are subject to availability and may change.</div>
    <div class="sign"><span>Customer's signature</span><span id="for-co">For: Company</span></div>

    <div class="noprint"><button class="btn" onclick="window.print()">🖨️ Print quotation</button></div>
  </div>

<script>
  function esc(t){ return String(t==null?"":t).replace(/[&<>"\x27]/g, function(ch){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","\x27":"&#39;"}[ch]; }); }
  var money = function(n){ return "\u20a6" + Number(n||0).toLocaleString("en-NG", { minimumFractionDigits: 2 }); };
  var fmtD = function(d){ return new Date(d).toLocaleDateString("en-NG", { day:"2-digit", month:"short", year:"numeric" }); };

  var params = new URLSearchParams(location.search);
  var id = params.get("id");
  var apiBase = localStorage.getItem("apiBase");
  var token = localStorage.getItem("token");
  var companyId = localStorage.getItem("companyId");

  (async function(){
    if(!id || !apiBase){ document.body.innerHTML = '<p style="padding:24px;font-family:sans-serif">Missing quotation id. Open this from the Quotations screen.</p>'; return; }
    try{
      var res = await fetch(apiBase + "/quotations/" + id, { headers: { "Authorization": "Bearer " + token, "X-Company-Id": companyId } });
      if(!res.ok) throw new Error("Could not load this quotation.");
      var q = await res.json();

      document.getElementById("company").childNodes[0].nodeValue = q.company_name || "Quotation";
      document.getElementById("company-sub").textContent = [q.company_address, q.company_phone].filter(Boolean).join(" · ");
      document.getElementById("for-co").textContent = "For: " + (q.company_name || "");
      document.getElementById("cust").textContent = q.customer_name || "—";
      document.getElementById("cust-phone").textContent = q.customer_phone || "";
      document.getElementById("qno").textContent = q.quote_number || "";
      document.getElementById("date").textContent = fmtD(q.created_at);
      document.getElementById("note").textContent = q.note ? ("Note: " + q.note) : "";

      var tbody = document.getElementById("rows");
      var total = 0;
      (q.items || []).forEach(function(it, i){
        var amt = Number(it.quantity) * Number(it.unit_price); total += amt;
        var tr = document.createElement("tr");
        tr.innerHTML =
          '<td>'+(i+1)+'</td>'+
          '<td class="num">'+it.quantity+'</td>'+
          '<td>'+esc(it.name)+'</td>'+
          '<td class="num">'+money(it.unit_price)+'</td>'+
          '<td class="num">'+money(amt)+'</td>';
        tbody.appendChild(tr);
      });
      document.getElementById("total").textContent = money(total);

      setTimeout(function(){ window.print(); }, 400);
    }catch(e){ document.body.innerHTML = '<p style="padding:24px;font-family:sans-serif">' + e.message + '</p>'; }
  })();
</script>
</body>
</html>
